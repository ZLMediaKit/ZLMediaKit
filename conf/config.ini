#!!!!此配置文件为范例配置文件，意在告诉读者，各个配置项的具体含义和作用，
#!!!!该配置文件在执行cmake时，会拷贝至release/${操作系统类型}/${编译类型}(例如release/linux/Debug) 文件夹。
#!!!!该文件夹(release/${操作系统类型}/${编译类型})同时也是可执行程序生成目标路径，在执行MediaServer进程时，它会默认加载同目录下的config.ini文件作为配置文件，
#!!!!你如果修改此范例配置文件(conf/config.ini)，并不会被MediaServer进程加载，因为MediaServer进程默认加载的是release/${操作系统类型}/${编译类型}/config.ini。
#!!!!当然，你每次执行cmake，该文件确实会被拷贝至release/${操作系统类型}/${编译类型}/config.ini，
#!!!!但是一般建议你直接修改release/${操作系统类型}/${编译类型}/config.ini文件，修改此文件一般不起作用,除非你运行MediaServer时使用-c参数指定到此文件。

#!!!! This is a sample configuration file intended to explain the specific meaning and purpose of each configuration setting.
#!!!! During the `cmake` execution, this file will be copied to the `release/${OS type}/${build type}` (e.g., `release/linux/Debug`) directory.
#!!!! This directory also serves as the target path for generating the executable program. When starting the MediaServer process, it automatically loads the `config.ini` file located in the same directory by default.
#!!!! Modifications to this sample file (`conf/config.ini`) will not apply when running MediaServer because it expects `release/${OS type}/${build type}/config.ini`.
#!!!! While executing `cmake` will indeed copy this file to the target location, it's generally best custom to modify the config file directly in the run directory.
#!!!! Changes made to `conf/config.ini` will not take effect unless you explicitly load it using the `-c` parameter when starting the MediaServer.

[api]
#是否调试http api,启用调试后，会打印每次http请求的内容和回复
# Enable HTTP API debugging. When enabled, the content and reply of each HTTP request are logged.
apiDebug=1

#一些比较敏感的http api在访问时需要提供secret，否则无权限调用
#如果是通过127.0.0.1访问,那么可以不提供secret
# Certain sensitive HTTP APIs require a secret for access; otherwise, the request will be denied.
# The secret is not required if the API is accessed locally via `127.0.0.1`.
secret=035c73f7-bb6b-4889-a715-d9eb2d1925cc

#截图保存路径根目录，截图通过http api(/index/api/getSnap)生成和获取
# The root directory for saving snapshot images. Snapshots are generated and retrieved using the `/index/api/getSnap` HTTP API.
snapRoot=./www/snap/

#默认截图图片，在启动FFmpeg截图后但是截图还未生成时，可以返回默认的预设图片
# A default placeholder image to return after FFmpeg starts capturing a snapshot but the actual snapshot isn't ready.
defaultSnap=./www/logo.png

#downloadFile http接口可访问文件的根目录，支持多个目录，不同目录通过分号(;)分隔
# The root directories of files that are accessible through the `/index/api/downloadFile` HTTP interface. Use semicolons (;) to separate multiple directories.
downloadRoot=./www

#是否采用传统secret硬编码鉴权模式，默认开启，开启后每次http接口请求都需要传递secret
#关闭传统鉴权模式后，需要先调用/index/api/login接口登录，成功后将设置cookie，在cookie有效期内访问所有接口都将放行。
# Enable legacy hardcoded secret authentication mode (enabled by default). When enabled, every HTTP API request must include the secret.
# When disabled, you must first call the `/index/api/login` interface to sign in. Upon success, a cookie will be set for subsequent API requests without providing the secret within its validity period.
legacyAuth=1

[ffmpeg]
#FFmpeg可执行程序路径,支持相对路径/绝对路径
# The path to the FFmpeg executable. Both relative and absolute paths are supported.
bin=/usr/bin/ffmpeg

#FFmpeg拉流再推流的命令模板，通过该模板可以设置再编码的一些参数
# The FFmpeg command template for stream pulling and repushing. You can configure re-encoding parameters using this template.
cmd=%s -re -i %s -c:a aac -strict -2 -ar 44100 -ab 48k -c:v libx264 -f flv %s

#FFmpeg生成截图的命令，可以通过修改该配置改变截图分辨率或质量
# The FFmpeg command for generating snapshots. You can adjust the snapshot resolution and quality by modifying this command.
snap=%s -i %s -y -f mjpeg -frames:v 1 -an %s

#FFmpeg日志的路径，如果置空则不生成FFmpeg日志
#可以为相对(相对于本可执行程序目录)或绝对路径
# Path to the FFmpeg log file. FFmpeg logs will not be generated if left empty. Supports relative (to the executable's directory) and absolute paths.
log=./ffmpeg/ffmpeg.log

# 自动重启的时间(秒), 默认为0, 也就是不自动重启. 主要是为了避免长时间ffmpeg拉流导致的不同步现象
# The automatic restart interval in seconds. Defaults to 0 (no automatic restart). This helps prevent audio/video synchronization drift from prolonged FFmpeg stream pulling.
restart_sec=0

#转协议相关开关；如果addStreamProxy api和on_publish hook回复未指定转协议参数，则采用这些配置项
# Protocol conversion switches. These settings will be applied if the `addStreamProxy` API and `on_publish` hook responses do not specify protocol conversion parameters.
[protocol]
#转协议时，是否开启帧级时间戳覆盖
# 0:采用源视频流绝对时间戳，不做任何改变
# 1:采用zlmediakit接收数据时的系统时间戳(有平滑处理)
# 2:采用源视频流时间戳相对时间戳(增长量)，有做时间戳跳跃和回退矫正
# Enables frame-level timestamp overriding during protocol conversion:
# - 0: Use the absolute timestamp from the source video stream without modification.
# - 1: Use the system timestamp when ZLMediaKit receives data (with smoothing applied).
# - 2: Use the relative timestamp from the source video stream (increment), with corrections for timestamp jumps and backward drifts.
modify_stamp=2

#转协议是否开启音频
# Whether to include audio tracking when performing protocol conversions.
enable_audio=1

#添加acc静音音频，在关闭音频时，此开关无效
# Injects AAC silent audio. This setting is ignored if `enable_audio` is disabled.
add_mute_audio=1

#无人观看时，是否直接关闭(而不是通过on_none_reader hook返回close)
#此配置置1时，此流如果无人观看，将不触发on_none_reader hook回调，
#而是将直接关闭流
# Enables silent stream termination without triggering the `on_none_reader` hook. When set to 1, unviewed streams will simply shut down directly without sending the callback.
auto_close=0

#推流断开后可以在超时时间内重新连接上继续推流，这样播放器会接着播放。
#置0关闭此特性(推流断开会导致立即断开播放器)
#此参数不应大于播放器超时时间;单位毫秒
# After an interruption, clients can reconnect and resume streaming within this timeout period, preserving the ongoing playback experience for viewers.
# Set to 0 to disable this feature (disconnecting the stream immediately drops the players). This should not be higher than the player's connection timeout; in milliseconds.
continue_push_ms=15000

#平滑发送定时器间隔，单位毫秒，置0则关闭；开启后影响cpu性能同时增加内存
#该配置开启后可以解决一些流发送不平滑导致zlmediakit转发也不平滑的问题
# Smooth sending timer interval in milliseconds, set to 0 to disable. Activating this option ensures more consistent data pacing and rectifies stuttered forwarding caused by irregular stream input, but at the cost of higher CPU and memory usage.
paced_sender_ms=0

#是否开启转换为hls(mpegts)
# Enables HLS (mpegts) protocol conversion.
enable_hls=1

#是否开启转换为hls(fmp4)
# Enables HLS (fmp4) protocol conversion.
enable_hls_fmp4=0

#是否开启MP4录制
# Enables MP4 recording.
enable_mp4=0

#是否开启转换为rtsp/webrtc
# Enables RTSP/WebRTC protocol conversion.
enable_rtsp=1

#是否开启转换为rtmp/flv
# Enables RTMP/FLV protocol conversion.
enable_rtmp=1

#是否开启转换为http-ts/ws-ts
# Enables HTTP-TS/WS-TS protocol conversion.
enable_ts=1

#是否开启转换为http-fmp4/ws-fmp4
# Enables HTTP-FMP4/WS-FMP4 protocol conversion.
enable_fmp4=1

#是否将mp4录制当做观看者
# Treats MP4 recording processes as active stream viewers.
mp4_as_player=0

#mp4切片大小，单位秒
# Maximum duration (in seconds) of MP4 recording segments.
mp4_max_second=3600

#mp4录制保存路径
# Target destination path for MP4 recordings.
mp4_save_path=./www

#hls录制保存路径
# Target destination path for HLS recordings.
hls_save_path=./www

###### 以下是按需转协议的开关，在测试ZLMediaKit的接收推流性能时，请把下面开关置1
###### 如果某种协议你用不到，你可以把以下开关置1以便节省资源(但是还是可以播放，只是第一个播放者体验稍微差点)，
###### 如果某种协议你想获取最好的用户体验，请置0(第一个播放者可以秒开，且不花屏)
###### These toggle switches determine whether streams are converted to various protocols on demand. During performance testing for receiving streams, it's recommended to set all of them to 1.
###### For unused protocols, turning them on (setting to 1) will decrease resource consumption while still keeping them available (at the expense of a slight lag in startup time for the first viewer).
###### Alternatively, disable them (setting to 0) to ensure the first viewer benefits from immediate and uninterrupted streaming right from the start.

#hls协议是否按需生成，如果hls.segNum配置为0(意味着hls录制)，那么hls将一直生成(不管此开关)
# Should HLS segments be generated on demand? Disabling this implies constant generation (independent of this config) if `hls.segNum` is configured to 0 (meaning HLS recording is active).
hls_demand=0

#rtsp[s]协议是否按需生成
# Generate RTSP[S] streams on demand.
rtsp_demand=0

#rtmp[s]、http[s]-flv、ws[s]-flv协议是否按需生成
# Generate RTMP[S], HTTP[S]-FLV, and WS[S]-FLV streams on demand.
rtmp_demand=0

#http[s]-ts协议是否按需生成
# Generate HTTP[S]-TS streams on demand.
ts_demand=0

#http[s]-fmp4、ws[s]-fmp4协议是否按需生成
# Generate HTTP[S]-FMP4 and WS[S]-FMP4 streams on demand.
fmp4_demand=0

[general]
#是否启用虚拟主机
# Enable virtual hosting support.
enableVhost=0

#播放器或推流器在断开后会触发hook.on_flow_report事件(使用多少流量事件)，
#flowThreshold参数控制触发hook.on_flow_report事件阈值，使用流量超过该阈值后才触发，单位KB
# Upon player or publisher connection termination, the server registers an `on_flow_report` webhook event concerning data traffic.
# Use `flowThreshold` to dictate the minimum bandwidth utilization (in Kilobytes) required for triggering the event.
flowThreshold=1024

#播放最多等待时间，单位毫秒
#播放在播放某个流时，如果该流不存在，
#ZLMediaKit会最多让播放器等待maxStreamWaitMS毫秒
#如果在这个时间内，该流注册成功，那么会立即返回播放器播放成功
#否则返回播放器未找到该流，该机制的目的是可以先播放再推流
# Sets the maximum wait duration for streaming playback, in milliseconds.
# When a requested stream doesn't exist yet, ZLMediaKit puts the player request on hold up to the max threshold in hopes that the stream might originate later.
# If the stream becomes available within the limit, playback commences seamlessly.
# Timeouts will yield an error showing "stream not found". Use this to ensure an upfront audience footprint before a source is provided.
maxStreamWaitMS=15000

#某个流无人观看时，触发hook.on_stream_none_reader事件的最大等待时间，单位毫秒
#在配合hook.on_stream_none_reader事件时，可以做到无人观看自动停止拉流或停止接收推流
# Specifies the timeout constraint (in milliseconds) before releasing the `on_stream_none_reader` webhook event whenever a stream drops its last connection.
# Combined with the event webhook, this makes it possible to shut down the incoming streaming relays when viewers decrease to zero automatically.
streamNoneReaderDelayMS=20000

#拉流代理时如果断流再重连成功是否删除前一次的媒体流数据，如果删除将重新开始，
#如果不删除将会接着上一次的数据继续写(录制hls/mp4时会继续在前一个文件后面写)
# Defines stream continuity behavior. Determines whether cached content should be deleted upon a successful proxy connection following an interruption.
# Activating this flushes old contents, whereas disabling this would append any new footage seamlessly sequentially to previous recording files (HLS/MP4 recording).
resetWhenRePlay=1

#合并写缓存大小(单位毫秒)，合并写指服务器缓存一定的数据后才会一次性写入socket，这样能提高性能，但是会提高延时
#开启后会同时关闭TCP_NODELAY并开启MSG_MORE
# Merged write cache buffer interval scale (in milliseconds). The server retains pending data segments up to the capacity threshold and processes batch outputs against the socket to elevate overall performance (sacrificing latencies in extreme conditions).
# Doing so forces `TCP_NODELAY` and leverages `MSG_MORE`.
mergeWriteMS=0

#服务器唯一id，用于触发hook时区别是哪台服务器
# Standalone server unique identifier to trace distinct origin boxes on hook broadcasts.
mediaServerId=your_server_id

#最多等待未初始化的Track时间，单位毫秒，超时之后会忽略未初始化的Track
# The maximum duration (in milliseconds) the system will wait for tracks remaining in an uninitialized state before abandoning them.
wait_track_ready_ms=10000

#最多等待音频Track收到数据时间，单位毫秒，超时且完全没收到音频数据，忽略音频Track
#加快某些带封装的流metadata说明有音频，但是实际上没有的流ready时间（比如很多厂商的GB28181 PS）
# Time limit (in milliseconds) applied when waiting for an audio track's data payload. Failing to provide content within this span triggers abandonment.
# This prevents holding off readiness indefinitely when streaming inputs boast metadata pointing to an audio source that doesn't actually exist (for example, GB28181 PS protocols commonly misrepresenting audio feeds).
wait_audio_track_data_ms=1000

#如果流只有单Track，最多等待若干毫秒，超时后未收到其他Track的数据，则认为是单Track
#如果协议元数据有声明特定track数，那么无此等待时间
# Given a single track, establish a threshold timeout limit to hold available processing. With this passing and no extra tracks presented, only the current sequence prevails.
# There would be no timeouts applied given predefined source protocol tracks setup dictating expected variables.
wait_add_track_ms=3000

#如果track未就绪，我们先缓存帧数据，但是有最大个数限制，防止内存溢出
# Before tracks are ready, frames are buffered within the cache under an absolute maximum to avoid causing memory leak bounds.
unready_frame_cache=100

#是否启用观看人数变化事件广播，置1则启用，置0则关闭
# Signals when active viewers fluctuate, enabled with 1, disabled on 0.
broadcast_player_count_changed=0

#绑定的本地网卡ip
# Interface's local bound address details.
listen_ip=::

[hls]
#hls写文件的buf大小，调整参数可以提高文件io性能
# The buffer capacity associated with HLS segment recording processing. Larger boundaries yield stronger IO rates.
fileBufSize=65536

#hls最大切片时间
# Targeted duration spanning single HLS segments.
segDur=2

#m3u8索引中,hls保留切片个数(实际保留切片个数+segRetain个)
#如果设置为0，则不删除切片且m3u8文件全量记录切片列表
# Size mapping of HLS segment arrays defined inside standard m3u8 playlist declarations (with total chunks corresponding to base size + variables).
# To completely retain all chunks alongside the playlist mapping, set this to 0.
segNum=3

#HLS切片延迟个数，大于0将生成hls_delay.m3u8文件，0则不生成
# Indicated thresholds pointing out intentional segment timeline lags, generating corresponding `hls_delay.m3u8` variant listings.
segDelay=0

#HLS切片从m3u8文件中移除后，继续保留在磁盘上的个数
# Maximum quantity dictating outdated chunks maintaining a presence locally after retiring through their m3u8 playlist cycles.
segRetain=5

#是否广播 hls切片(ts/fmp4)完成通知(on_record_ts)
# Broadcast completion calls mapped onto `on_record_ts` referencing HLS completion tasks (TS/FMP4).
broadcastRecordTs=0

#直播hls文件删除延时，单位秒，issue: #913
# Configured interval delay before attempting deletion on expired segments.
deleteDelaySec=10

#此选项开启后m3u8文件还是表现为直播，但是切片文件会被全部保留为点播用
#segDur设置为0或segKeep设置为1的情况下，每个切片文件夹下会生成一个vod.m3u8文件用于点播该时间段的录像
# When enabled, an `m3u8` variant presents live media while chunks maintain a local presence permanently.
# Given either variable `segKeep` is selected at 1, or `segDur` configures on 0, standard variants follow directory configurations generating equivalent `vod.m3u8` file structures holding on to standard recordings.
segKeep=0

#如果设置为1，则第一个切片长度强制设置为1个GOP。当GOP小于segDur，可以提高首屏速度
# Dictates forced size rules associated with initial fragments restricted under 1 GOP duration constraints. With instances possessing tighter durations, initial launch frames optimize dramatically.
fastRegister=0

[hook]
#是否启用hook事件，启用后，推拉流都将进行鉴权
# Activating tracking via webhook queries. When supported, both pushing and pulling configurations remain subjected to rigid tracking patterns.
enable=0

#播放器或推流器使用流量事件，置空则关闭
# Configured Webhook addressing tracked playback instances handling outbound data footprints. Disabled when omitted.
on_flow_report=

#访问http文件鉴权事件，置空则关闭鉴权
# Configured Webhook indicating access patterns referencing HTTP directories. Disabled when omitted.
on_http_access=

#播放鉴权事件，置空则关闭鉴权
# Configured Webhook executing streaming validations supporting connections. Disabled when omitted.
on_play=

#推流鉴权事件，置空则关闭鉴权
# Configured Webhook indicating tracking procedures related towards publishing endpoints. Disabled when omitted.
on_publish=

#录制mp4切片完成事件
# Reporting MP4 segment generation and concluding outputs.
on_record_mp4=

# 录制 hls ts(或fmp4) 切片完成事件
# Concluding details corresponding to HLS chunk generation records.
on_record_ts=

#rtsp播放鉴权事件，此事件中比对rtsp的用户名密码
# Conflicting processes analyzing user and validation combinations tied upon generic RTSP sequences.
on_rtsp_auth=

#rtsp播放是否开启专属鉴权事件，置空则关闭rtsp鉴权。rtsp播放鉴权还支持url方式鉴权
#建议开发者统一采用url参数方式鉴权，rtsp用户名密码鉴权一般在设备上用的比较多
#开启rtsp专属鉴权后，将不再触发on_play鉴权事件
# Extends specific Webhook calls handling tailored protocol tracking scenarios applied using dynamic RTSP configurations. URL queries also remain enabled.
# Standard unified API logic functions prefer addressing configurations utilizing URL structures considering its popularity. Device boundaries handle basic username configurations more heavily.
# Calling RTSP validation blocks bypasses existing responses defined within `on_play`.
on_rtsp_realm=

#远程telnet调试鉴权事件
# Authenticating login behaviors executing telnet validation bounds.
on_shell_login=

#直播流注册或注销事件
# Tracing dynamic variables connected to registering actions via standard sequences.
on_stream_changed=

#过滤on_stream_changed hook的协议类型，可以选择只监听某些感兴趣的协议；置空则不过滤协议
# Target filtering criteria controlling what details execute when querying active streaming configurations. Standard procedures don't filter.
stream_changed_schemas=rtsp/rtmp/fmp4/ts/hls/hls.fmp4

#无人观看流事件，通过该事件，可以选择是否关闭无人观看的流。配合general.streamNoneReaderDelayMS选项一起使用
# Outbound connections resolving against zero-audience conditions allowing automatic execution tied with closing bounds. Usually applied combined with configured timing structures.
on_stream_none_reader=

#播放时，未找到流事件，通过配合hook.on_stream_none_reader事件可以完成按需拉流
# Handling playback calls missing actual source tracks using webhook boundaries resolving toward tailored on-demand requests.
on_stream_not_found=

#服务器启动报告，可以用于服务器的崩溃重启事件监听
# Outlining server processing activities logging standard starts resolving tracking measures matching reboot scenarios.
on_server_started=

#服务器退出报告，当服务器正常退出时触发
# Validating execution routines mapping active outputs mapping to a proper endpoint ending.
on_server_exited=

#server保活上报
# Ping status validations controlling keepalive cycles pointing toward proper system conditions.
on_server_keepalive=

#发送rtp(startSendRtp)被动关闭时回调
# Callback handling tracking events originating against a passive shut-down executing the protocol via RTP configurations.
on_send_rtp_stopped=

#rtp server 超时未收到数据
# Establishing system behaviors tracking missing datasets tied with the RTP protocols encountering timeouts.
on_rtp_server_timeout=

#hook api最大等待回复时间，单位秒
# Limit execution tracking and handling timeout conditions upon webhook outputs, configured using targeted seconds.
timeoutSec=10

#keepalive hook触发间隔,单位秒，float类型
# Intervals resolving routine queries checking server ping variables using structured intervals.
alive_interval=10.0

#hook通知失败重试次数,正整数。为0不重试，1时重试一次，以此类推
# Defines automatic tracking mechanisms maintaining sequential calls bypassing errors mapped within positive boundaries. Set 0 as static or configure values sequentially representing targeted trials.
retry=1

#hook通知失败重试延时，单位秒，float型
# Resolves dynamic time constraints acting between routine queries attempting failed sequences, handling floating variables pointing at seconds.
retry_delay=3.0

[cluster]
#设置源站拉流url模板, 格式跟printf类似，第一个%s指定app,第二个%s指定stream_id,
#开启集群模式后，on_stream_not_found和on_stream_none_reader hook将无效.
#溯源模式支持以下类型:
#rtmp方式: rtmp://127.0.0.1:1935/%s/%s
#rtsp方式: rtsp://127.0.0.1:554/%s/%s
#hls方式: http://127.0.0.1:80/%s/%s/hls.m3u8
#http-ts方式: http://127.0.0.1:80/%s/%s.live.ts
#支持多个源站，不同源站通过分号(;)分隔
# Identifies structural constraints governing origins addressing endpoint templates matching printf behaviors, with the first string matching app logic and the next referring stream endpoints.
# Incorporating clustering blocks responses related with missed datasets mapping `on_stream_not_found` and `on_stream_none_reader`.
# Supports trace sources handling rtmp, rtsp, hls, and http-ts templates mapped toward internal IP processing. Apply semicolons acting across multiple environments balancing sources independently.
origin_url=

#溯源总超时时长，单位秒，float型；假如源站有3个，那么单次溯源超时时间为timeout_sec除以3
#单次溯源超时时间不要超过general.maxStreamWaitMS配置
# Maps maximum waiting processes pointing around total trace mechanisms tracking floats across seconds. Dividing intervals balances load spanning distinct points.
# Timeouts spanning single targets shouldn't expand outside global parameters defined inside configurations.
timeout_sec=15

#溯源失败尝试次数，-1时永久尝试
# Attempted query checks dealing dynamically with retries targeting -1 indicating infinite bounds spanning the origin network.
retry_count=3

[http]
#http服务器字符编码集
# Configures the server character set applied toward mapping valid parameters mapping standards securely.
charSet=utf-8

#http链接超时时间
# Represents valid time boundaries defining connection statuses facing HTTP servers mapping valid thresholds handling drop variables.
keepAliveSecond=30

